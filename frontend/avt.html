<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>

    <link rel="stylesheet" href="avt.css">
</head>

<body>

<header class="header">

    <div class="header-content">

        <img
            src="logo.png"
            alt="Логотип"
            class="logo">

        <div class="header-title">
            КГБУЗ «Детская городская больница, г. Рубцовск» - Управление коечным фондом
        </div>

    </div>

</header>

    <div class="wrapper">

        <div class="wrapper-form">

            <h1 class="title">
                Вход в систему
            </h1>

            <form class="reg-form" autocomplete="off">

                <input
                    type="text"
                    name="username"
                    class="reg-input"
                    placeholder="Логин">

                <input
                    type="password"
                    name="password"
                    class="reg-input"
                    placeholder="Пароль">

                <button
                    type="submit"
                    class="reg-sub">

                    Войти

                </button>

            </form>

        </div>

    </div>

    <script src="auth.js"></script>

</body>

</html>
